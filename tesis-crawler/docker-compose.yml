services:
  db:
    image: pgvector/pgvector:pg17-trixie
    container_name: tesis_db
    restart: always
    ports:
      - "6464:5432"
    env_file:
      - .env
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgai:
    image: timescale/timescaledb-ha:pg17-amd64
    container_name: tesis_pgai
    restart: always
    ports:
      - "6565:5432"
    env_file:
      - .env
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - pgai_data:/home/postgres/pgdata

  vectorizer-worker:
    image: timescale/pgai-vectorizer-worker:latest
    container_name: tesis_pgai_vectorizer_worker
    restart: always
    depends_on:
      - pgai
    env_file:
      - .env
    environment:
      - PGAI_VECTORIZER_WORKER_DB_URL=postgres://tesis:tesis@pgai:5432/tesis
      - OPENAI_API_KEY=${OPENAI_API_KEY}

volumes:
  pgai_data:
  postgres_data:
